name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin to v6
        with:
          node-version: "20"
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Belt-and-braces: contributors are expected to install local
      # pre-commit hooks via `pre-commit install`; this step makes CI
      # fail loudly the same way if they didn't.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run all pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  self-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install "agent-readiness>=1.1.0"
      - run: agent-readiness scan . --fail-below 95
